  <script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark');</script>
  <style>
    /* ── MÉDIA TABS ── */
    .media-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
    }

    .media-tab {
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      padding: 1rem 2.25rem;
      border: none;
      background: none;
      color: var(--muted);
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
      letter-spacing: 0.01em;
    }

    .media-tab:hover { color: var(--text); }

    .media-tab.active {
      color: var(--text);
      font-weight: 500;
    }

    .media-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 2px;
      background: var(--text);
    }

    /* ── FOTÓK LAYOUT: sidebar + galéria ── */
    .foto-layout {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 3rem;
      align-items: start;
    }

    .filter-sidebar {
      position: sticky;
      top: 90px;
    }

    .filter-list {
      list-style: none;
      display: flex;
      flex-direction: column;
    }

    .filter-btn {
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
      transition: color 0.2s;
      width: 100%;
    }

    .filter-btn:first-child { border-top: 1px solid var(--border); }
    .filter-btn:hover { color: var(--text); }
    .filter-btn.active { color: var(--text); font-weight: 500; }

    /* ── GALÉRIA ── */
    .gallery {
      columns: 2;
      column-gap: 0.75rem;
    }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 0.75rem;
      overflow: hidden;
      border-radius: 4px;
      cursor: zoom-in;
    }

    .gallery-item.hidden { display: none; }

    .gallery-item img {
      width: 100%;
      display: block;
      transition: transform 0.45s ease;
    }

    .gallery-item:hover img { transform: scale(1.03); }

    /* ── VIDEÓK (in-tab) ── */
    .video-section { margin-bottom: 3.5rem; }

    .video-section h3 {
      font-size: 1rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    .videos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    .video-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .video-item iframe,
    .video-item video {
      width: 100%;
      aspect-ratio: 16/9;
      display: block;
      border: none;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0,0,0,0.92);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 3px; }
    .lightbox-close { position: absolute; top: 1.5rem; right: 1.75rem; color: rgba(255,255,255,0.6); font-size: 1.5rem; cursor: pointer; transition: color 0.2s; }
    .lightbox-close:hover { color: #fff; }

    @media (max-width: 768px) {
      .foto-layout { grid-template-columns: 1fr; gap: 1.5rem; }
      .filter-sidebar { position: static; }
      .filter-list { flex-direction: row; flex-wrap: wrap; gap: 0.4rem; border-top: none; }
      .filter-btn {
        border: 1px solid var(--border) !important;
        border-radius: 100px;
        padding: 0.35rem 0.9rem;
        width: auto;
        font-size: 0.78rem;
      }
      .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text) !important; }
      .gallery { columns: 1; }
      .videos-grid, .reels-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 480px) { .gallery { columns: 1; } }
  </style>

  <script>
    // Media tabs
    const mediaTabs = document.querySelectorAll('.media-tab');
    mediaTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        mediaTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-foto').style.display = tab.dataset.tab === 'foto' ? '' : 'none';
        document.getElementById('tab-video').style.display = tab.dataset.tab === 'video' ? '' : 'none';
      });
    });

    // Filter buttons
    const filterBtns = document.querySelectorAll('.filter-btn');
    const items = document.querySelectorAll('.gallery-item');

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const f = btn.dataset.filter;
        items.forEach(item => {
          item.classList.toggle('hidden', f !== 'osszes' && item.dataset.cat !== f);
        });
      });
    });

    // Lightbox
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    items.forEach(item => {
      item.addEventListener('click', () => {
        lbImg.src = item.querySelector('img').src;
        lb.classList.add('open');
      });
    });
    [lb, document.getElementById('lbClose')].forEach(el => el.addEventListener('click', () => lb.classList.remove('open')));
    lbImg.addEventListener('click', e => e.stopPropagation());
    document.addEventListener('keydown', e => { if (e.key === 'Escape') lb.classList.remove('open'); });
  </script>
